<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verify Company Admin · Aura</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial;color:#20211f}.card{width:min(430px,94vw);background:#fff;border-radius:24px;padding:38px}h1{margin:0 0 8px}p{color:#737970;line-height:1.5}.toast{padding:12px;border-radius:10px;background:#e5ebfa;color:#34528e;margin:16px 0}.toast.error{background:#fde8e7;color:#9c2d27}label{display:block;font-weight:700;margin-top:16px}input{display:block;width:100%;padding:13px;margin-top:7px;border:1px solid #dfe2db;border-radius:10px}.otp{font-size:22px;letter-spacing:6px;text-align:center}button{width:100%;padding:14px;margin-top:20px;border:0;border-radius:11px;background:#dfff3f;font-weight:800}a{color:#5e635d;text-decoration:none;font-weight:700}</style></head><body><main class="card"><h1>Verify Company Admin</h1><p>Enter the six-digit code from your email and choose a new password.</p>{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}<form method="post"><label>Email<input required type="email" name="email" value="{{email}}"></label><label>Six-digit code<input required class="otp" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"></label><label>New password<input required type="password" name="password" minlength="8"></label><label>Confirm password<input required type="password" name="confirm_password" minlength="8"></label><button>Verify and reset password</button></form><p><a href="/platform/forgot-password">Send another code →</a></p></main></body></html>
