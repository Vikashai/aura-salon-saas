<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Set Company Admin password · Aura</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial;color:#20211f}.card{width:min(430px,94vw);background:#fff;border-radius:24px;padding:38px}h1{margin:0 0 8px}p{color:#737970;line-height:1.5}.toast{padding:12px;border-radius:10px;background:#fde8e7;color:#9c2d27;margin:16px 0}label{display:block;font-weight:700;margin-top:16px}input{display:block;width:100%;padding:13px;margin-top:7px;border:1px solid #dfe2db;border-radius:10px}button{width:100%;padding:14px;margin-top:20px;border:0;border-radius:11px;background:#dfff3f;font-weight:800}a{color:#5e635d;text-decoration:none;font-weight:700}</style></head><body><main class="card"><h1>{{'Activate Company Admin' if purpose=='invite' else 'Choose a new password'}}</h1>{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}{% if invalid %}<p>This secure link is invalid or expired.</p><p><a href="/platform/forgot-password">Request another link →</a></p>{% else %}<p>Use at least eight characters. This link works only once.</p><form method="post"><input type="hidden" name="token" value="{{token}}"><label>New password<input required type="password" name="password" minlength="8" autocomplete="new-password"></label><label>Confirm password<input required type="password" name="confirm_password" minlength="8" autocomplete="new-password"></label><button>Save password</button></form>{% endif %}</main></body></html>
