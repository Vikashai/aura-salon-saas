{% extends "base_public.html" %}{% block title %}Start free{% endblock %}
{% block head %}<style>.apply-card{background:#fff;border:1px solid #e2e5dd;border-radius:24px;padding:30px}.apply-card h1{margin:0 0 8px;font:700 30px Manrope}.apply-card>p{color:#737970;margin:0 0 24px}.apply-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.wide{grid-column:1/-1}@media(max-width:600px){.apply-grid{grid-template-columns:1fr}.wide{grid-column:auto}}</style>{% endblock %}
{% block content %}<div class="apply-card"><h1>Bring your salon to Aura</h1><p>Tell us about your business. Access is created after our team reviews your application.</p><form method="post" class="apply-grid"><label>Salon name<input name="salon_name" required></label><label>Owner name<input name="owner_name" required></label><label>Email<input name="email" type="email" required></label><label>Mobile number<input name="mobile" inputmode="numeric" required></label><label>City<input name="city"></label><label class="wide">Anything we should know?<textarea name="message"></textarea></label><button class="btn primary full wide" type="submit">Submit application</button></form></div>{% endblock %}
