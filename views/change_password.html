{% extends 'base.html' %}{% block content %}<div style="max-width:560px;margin:40px auto"><div class="form-card"><p class="eyebrow" style="margin:0 0 10px!important">ACCOUNT SECURITY</p><h1 style="font:700 30px Manrope;margin:0 0 8px">Change your password</h1><p style="color:var(--muted);margin-bottom:24px">Choose a private password with at least 8 characters.</p><form method="post"><div class="form-grid" style="grid-template-columns:1fr"><label>Current password<input required type="password" name="current_password" autocomplete="current-password"></label><label>New password<input required type="password" name="new_password" minlength="8" autocomplete="new-password"></label><label>Confirm new password<input required type="password" name="confirm_password" minlength="8" autocomplete="new-password"></label></div><button class="btn primary full" type="submit">Change password</button></form></div></div>{% endblock %}
