<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Forgot password · Aura</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial,sans-serif;color:#20211f}.card{background:#fff;border-radius:24px;padding:38px;width:min(430px,94vw);box-shadow:0 24px 60px #0006}.mark{width:36px;height:36px;border-radius:50%;background:#dfff3f;display:grid;place-items:center;margin-bottom:24px}h1{margin:0 0 8px}p{color:#737970;line-height:1.55}.toast{padding:12px;border-radius:10px;background:#e9f3ff;color:#34528e;margin:16px 0}.toast.error{background:#fde8e7;color:#9c2d27}label{display:block;font-weight:700;margin-top:22px}input{width:100%;padding:13px;margin-top:7px;border:1px solid #dfe2db;border-radius:10px;font:inherit}button{width:100%;padding:14px;margin-top:16px;border:0;border-radius:11px;background:#dfff3f;font-weight:800;cursor:pointer}a{color:#4f554e;text-decoration:none;font-weight:700}.back{text-align:center;margin-top:20px}</style></head><body><main class="card"><div class="mark">✦</div><h1>Reset your password</h1><p>Enter the real email connected to your Aura account. We will send a six-digit code valid for 10 minutes.</p>{% if error %}<div class="toast error">{{error}}</div>{% endif %}{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}<form method="post"><label>Email address<input required type="email" name="email" value="{{email or ''}}" autocomplete="email" autofocus></label><button>Send verification code</button></form><p class="back"><a href="/login">← Back to sign in</a></p></main></body></html>
