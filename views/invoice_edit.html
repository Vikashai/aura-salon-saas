{% extends 'base.html' %}{% block content %}<div class="page-head"><div><a class="back" href="/billing/{{sale.id}}">← {{sale.invoice_no}}</a><h1>Edit invoice</h1><p>Update payment, discount, tax and invoice notes. Existing line items remain unchanged.</p></div></div>
<form method="post" class="form-layout"><div class="form-main"><div class="form-card"><h3>Invoice details</h3><div class="form-grid"><label>Customer<input value="{{sale.customer}}" readonly></label><label>Invoice date<input required type="date" name="invoice_date" value="{{sale.invoice_date}}"></label><label>Subtotal<input value="{{sale.subtotal}}" readonly></label><label>Discount<input type="number" min="0" step="0.01" name="discount" id="edit-discount" value="{{sale.discount}}" oninput="toggleEditReason()"></label><label class="span-2">Discount reason <small>Required when a discount is applied</small><input name="discount_note" id="edit-discount-note" maxlength="255" value="{{sale.discount_note or ''}}"></label><label class="switch-row"><span><strong>Apply GST</strong></span><input type="checkbox" name="gst_enabled" {% if sale.gst_enabled %}checked{% endif %}></label><label>GST percentage<input type="number" min="0" step="0.01" name="gst_percent" value="{{sale.gst_percent}}"></label></div></div><div class="form-card"><h3>Notes</h3><div class="form-grid"><label>Bill notes<textarea name="notes">{{sale.notes or ''}}</textarea></label><label>Internal notes<textarea name="internal_notes">{{sale.internal_notes or ''}}</textarea></label></div></div></div>
<aside><div class="form-card sticky"><h3>Payment</h3><label>Amount received*<input required type="number" min="0" step="0.01" name="paid_amount" value="{{sale.paid_amount}}"></label><label>Payment mode*<select required name="payment_mode">{% for mode in ['UPI','Cash','Card','Bank Transfer','Split Payment','Other'] %}<option {% if sale.payment_mode==mode %}selected{% endif %}>{{mode}}</option>{% endfor %}</select></label><button class="btn primary full" type="submit">Save invoice changes</button><a class="btn ghost full" href="/billing/{{sale.id}}">Cancel</a></div></aside></form>
<script>function toggleEditReason(){document.getElementById('edit-discount-note').required=(+document.getElementById('edit-discount').value||0)>0}toggleEditReason()</script>{% endblock %}
