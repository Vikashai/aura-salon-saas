<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Choose password · Aura</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial,sans-serif;color:#20211f}.card{background:#fff;border-radius:24px;padding:38px;width:min(430px,94vw);box-shadow:0 24px 60px #0006}.mark{width:36px;height:36px;border-radius:50%;background:#dfff3f;display:grid;place-items:center;margin-bottom:24px}h1{margin:0 0 8px}p{color:#737970;line-height:1.55}.toast{padding:12px;border-radius:10px;background:#fde8e7;color:#9c2d27;margin:16px 0}label{display:block;font-weight:700;margin-top:16px}input{width:100%;padding:13px;margin-top:7px;border:1px solid #dfe2db;border-radius:10px;font:inherit}button{width:100%;padding:14px;margin-top:20px;border:0;border-radius:11px;background:#dfff3f;font-weight:800;cursor:pointer}a{color:#4f554e;text-decoration:none;font-weight:700}</style></head><body><main class="card"><div class="mark">✦</div><h1>Choose a new password</h1>{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}{% if invalid %}<p>This reset link is invalid or has expired.</p><p><a href="/forgot-password">Request a new link →</a></p>{% else %}<p>Use at least 8 characters. This link can only be used once.</p><form method="post"><input type="hidden" name="token" value="{{token}}"><label>New password<input required type="password" name="password" minlength="8" autocomplete="new-password"></label><label>Confirm password<input required type="password" name="confirm_password" minlength="8" autocomplete="new-password"></label><button>Save new password</button></form>{% endif %}</main></body></html>
