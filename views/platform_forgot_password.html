<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Company Admin recovery · Aura</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial;color:#20211f}.card{width:min(430px,94vw);background:#fff;border-radius:24px;padding:38px}h1{margin:0 0 8px}p{color:#737970;line-height:1.5}.toast{padding:12px;border-radius:10px;background:#e5ebfa;color:#34528e;margin:16px 0}.toast.error{background:#fde8e7;color:#9c2d27}label{display:block;font-weight:700;margin-top:18px}input{display:block;width:100%;padding:13px;margin-top:7px;border:1px solid #dfe2db;border-radius:10px}button{width:100%;padding:14px;margin-top:20px;border:0;border-radius:11px;background:#dfff3f;font-weight:800}a{display:block;text-align:center;margin-top:16px;color:#5e635d;text-decoration:none;font-weight:700}</style></head><body><main class="card"><h1>Reset Company Admin password</h1><p>Enter the verified email connected to your Company Admin account.</p>{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}<form method="post"><label>Email<input required type="email" name="email" autocomplete="email"></label><button>Send secure reset link</button></form><a href="/platform/login">Back to sign in</a></main></body></html>
