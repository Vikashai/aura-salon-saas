<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Account recovery · Aura Company</title><style>*{box-sizing:border-box}body{margin:0;background:#f5f6f1;color:#20211f;font:14px Arial,sans-serif}.wrap{width:min(760px,calc(100% - 32px));margin:45px auto}.back{color:#62685f;text-decoration:none;font-weight:700}.card{background:#fff;border:1px solid #dfe3da;border-radius:22px;padding:28px;margin-top:18px}h1{margin:0 0 8px}p{color:#6e746c;line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}label{font-weight:700}input{display:block;width:100%;margin-top:7px;padding:12px;border:1px solid #dfe3da;border-radius:10px;font:inherit}.full{grid-column:1/-1}.btn{border:0;border-radius:11px;background:#dfff3f;padding:13px 18px;font-weight:800;cursor:pointer}.flash{padding:12px;border-radius:10px;background:#e5f4d8;color:#3d711e;margin:15px 0}.flash.error{background:#fde8e7;color:#9c2d27}@media(max-width:620px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><main class="wrap"><a class="back" href="/platform">← Company overview</a><section class="card"><h1>Recover a salon account</h1><p>Set the user’s sign-in email and a temporary password. Their existing sessions will be revoked and they must change the temporary password after signing in.</p>{% for cat,msg in flashes %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}<form method="post" class="grid"><label>Salon slug<input required name="salon_slug" placeholder="raja-rani"></label><label>Username<input required name="username" placeholder="admin"></label><label class="full">User email<input required type="email" name="email" placeholder="owner@example.com"></label><label class="full">Temporary password<input required type="password" name="password" minlength="8" autocomplete="new-password"></label><div class="full"><button class="btn">Save recovery access</button></div></form></section></main></body></html>
