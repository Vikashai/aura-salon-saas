<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Platform administration · Aura</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#20211f;display:grid;place-items:center;font:14px Arial;color:#20211f}.card{width:min(420px,92vw);background:#fff;border-radius:24px;padding:38px}.mark{width:38px;height:38px;border-radius:50%;background:#dfff3f;display:grid;place-items:center}h1{margin:24px 0 6px}p{color:#737970;margin:0 0 24px}label{display:block;font-weight:600;margin:14px 0 6px}input{width:100%;padding:13px;border:1px solid #dfe2db;border-radius:10px}button{width:100%;margin-top:20px;padding:14px;border:0;border-radius:11px;background:#dfff3f;font-weight:700}.toast{background:#fde8e7;color:#9c2d27;padding:12px;border-radius:10px;margin:12px 0}</style></head><body><main class="card"><div class="mark">✦</div><h1>Aura platform</h1><p>Master administration—not salon staff access.</p>{% for cat,msg in flashes %}<div class="toast {{cat}}">{{msg}}</div>{% endfor %}<form method="post"><label>Username</label><input name="username" required autofocus><label>Password</label><input name="password" type="password" required><button>Sign in to platform</button></form></main></body></html>
